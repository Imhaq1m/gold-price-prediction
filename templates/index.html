<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gold Price Prediction</h1>
            <p class="subtitle">LSTM-Attention Model &middot; GLD ETF</p>
        </header>

        <div class="cards">
            <div class="card" id="card-last">
                <span class="label">Last Close</span>
                <span class="value" id="last-close">&mdash;</span>
                <span class="meta" id="last-date"></span>
            </div>
            <div class="card accent" id="card-pred">
                <span class="label">Predicted Next</span>
                <span class="value" id="pred-price">&mdash;</span>
                <span class="meta" id="pred-return"></span>
            </div>
            <div class="card" id="card-bias">
                <span class="label">Bias Correction</span>
                <span class="value" id="bias-value">&mdash;</span>
                <span class="meta">applied per step</span>
            </div>
        </div>

        <div class="chart-box">
            <h2>Price Forecast</h2>
            <div class="forecast-selector">
                <span>Forecast:</span>
                <button class="forecast-btn" data-days="1">1 Day</button>
                <button class="forecast-btn" data-days="5">5 Days</button>
                <button class="forecast-btn" data-days="10">10 Days</button>
                <button class="forecast-btn active" data-days="30">30 Days</button>
                <input type="number" id="custom-days" min="1" max="30" placeholder="Custom">
                <button id="custom-go">Go</button>
            </div>
            <canvas id="forecastChart" height="300"></canvas>
        </div>

        <footer>
            <p>Data: Yahoo Finance (GLD) &middot; Model: LSTM + Multi-Head Attention &middot; 31 features &middot; 5-fold CV</p>
        </footer>
    </div>

    <script>
        let forecastDays = 30;
        const ctx = document.getElementById('forecastChart').getContext('2d');
        let chart = null;

        function fmt(n) { return '$' + Number(n).toFixed(2); }

        function dayName(d) {
            return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' });
        }

        async function refresh() {
            const res = await fetch('/api/predict/' + forecastDays);
            const data = await res.json();

            document.getElementById('last-close').textContent = fmt(data.last_close);
            document.getElementById('last-date').textContent = data.last_date + ' ' + dayName(data.last_date);
            document.getElementById('pred-price').textContent = fmt(data.predicted_price);
            const sign = data.predicted_return_pct >= 0 ? '+' : '';
            document.getElementById('pred-return').textContent = sign + data.predicted_return_pct.toFixed(2) + '%';
            document.getElementById('bias-value').textContent = fmt(data.bias_correction);

            const fc = data.forecast;
            const labels = fc.map(function(d) { return d.date + ' ' + dayName(d.date); });
            const prices = fc.map(function(d) { return d.price; });
            const returns = fc.map(function(d) { return d.return_pct; });

            if (chart) {
                chart.data.labels = labels;
                chart.data.datasets[0].data = prices;
                chart.data.datasets[0].returns = returns;
                chart.update();
            } else {
                chart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [{
                        label: 'Predicted Price',
                        data: prices,
                        returns: returns,
                        borderColor: '#f0b429',
                        backgroundColor: 'rgba(240, 180, 41, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                    }] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(ctx2) {
                                        const r = chart.data.datasets[0].returns;
                                        return fmt(ctx2.parsed.y) + '  (' + (r ? r[ctx2.dataIndex].toFixed(2) : '0.00') + '%)';
                                    }
                                }
                            },
                            legend: { labels: { color: '#94a3b8' } }
                        },
                        scales: {
                            x: { ticks: { maxTicksLimit: 15, font: { size: 11 }, color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.04)' } },
                            y: { ticks: { callback: function(v) { return '$' + v.toFixed(0); }, color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.04)' } }
                        }
                    }
                });
            }

            document.getElementById('card-pred').style.animation = 'none';
            setTimeout(function() {
                document.getElementById('card-pred').style.animation = 'fadeIn 0.5s ease';
            }, 10);
        }

        refresh();
        setInterval(refresh, 120000);

        document.querySelectorAll('.forecast-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.forecast-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                document.getElementById('custom-days').value = '';
                forecastDays = parseInt(btn.dataset.days);
                refresh();
            });
        });

        document.getElementById('custom-go').addEventListener('click', function() {
            var val = parseInt(document.getElementById('custom-days').value);
            if (isNaN(val) || val < 1) { val = 1; }
            if (val > 30) { val = 30; }
            document.getElementById('custom-days').value = val;
            document.querySelectorAll('.forecast-btn').forEach(function(b) { b.classList.remove('active'); });
            forecastDays = val;
            refresh();
        });
        document.getElementById('custom-days').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { document.getElementById('custom-go').click(); }
        });
    </script>
</body>
</html>
